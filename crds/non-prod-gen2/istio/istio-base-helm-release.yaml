apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: istio-system
  chart:
    spec:
      chart: base
      version: "1.24.*"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    defaultRevision: default
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
