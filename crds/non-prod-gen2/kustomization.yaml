apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base/istio
  - ../base/gateway-api
  - ../base/longhorn
  - ../base/cert-manager
  - ../base/flux-operator
  - ../base/sealed-secrets
  - ../base/onepassword
  - ../base/kube-prometheus-stack
  - ../base/external-dns

patches:
  - target:
      kind: HelmRelease
      name: istio-base
    patch: |-
      - op: replace
        path: /spec/chart/spec/version
        value: "1.30.*"
