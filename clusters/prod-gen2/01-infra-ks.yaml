apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-ks
  namespace: flux-system
spec:
  dependsOn:
    - name: crds-ks
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  path: ./infra/prod-gen2/
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
