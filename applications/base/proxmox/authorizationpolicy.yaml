# Mirrors apps/homelab/proxmox/proxmox-ingress whitelist-source-range on the shared
# Istio ingress gateway. Without the catch-all rule, any ALLOW policy on the gateway
# would default-deny traffic that does not match (breaking other HTTPRoutes).
#
# Hosts in rules[].to[].operation are patched per cluster in *-gen2/proxmox/kustomization.yaml
# (defaults here match non-prod, like base httproute*.yaml).
#
# ipBlocks: client IP from the connection (typical with externalTrafficPolicy: Local).
# remoteIpBlocks: trusted client IP from PROXY / X-Forwarded-For (see gateway
# proxy.istio.io/config). The from: list is OR — allow if either matches.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: proxmox-ingress-ip-allowlist
  namespace: istio-system
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: istio-ingress
  action: ALLOW
  rules:
    - from:
        - source:
            ipBlocks:
              - "10.0.0.0/8"
              - "192.168.0.0/16"
              - "172.20.0.0/12"
              - "10.244.0.0/16"
        - source:
            remoteIpBlocks:
              - "10.0.0.0/8"
              - "192.168.0.0/16"
              - "172.20.0.0/12"
              - "10.244.0.0/16"
      to:
        - operation:
            hosts:
              - "proxmox.local.non-prod.abbottland.io"
    - to:
        - operation:
            notHosts:
              - "proxmox.local.non-prod.abbottland.io"
