---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runner-dind-amd64
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: arc-runners
  releaseName: non-prod-gen2-dind-runner
  dependsOn:
    - name: arc-controller
  chart:
    spec:
      chart: gha-runner-scale-set
      version: '0.14.1'
      sourceRef:
        kind: HelmRepository
        name: gha-runner-scale-set-charts
        namespace: flux-system
      interval: 12h
  values:
    githubConfigUrl: https://github.com/pbabbott/home-web-apps
    githubConfigSecret: arc-gh-secret
    runnerScaleSetName: non-prod-gen2-dind-runner
    minRunners: 1
    maxRunners: 3
    runnerGroup: default
    listenerTemplate:
      spec:
        containers:
          - name: listener
        dnsConfig:
          options:
            - name: ndots
              value: "2"
    containerMode: {}
    template:
      spec:
        dnsConfig:
          options:
            - name: ndots
              value: "2"
        nodeSelector:
          kubernetes.io/arch: amd64
        initContainers:
          - name: init-dind-externals
            image: ghcr.io/falcondev-oss/actions-runner:latest
            command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
            volumeMounts:
              - name: dind-externals
                mountPath: /home/runner/tmpDir

          - name: dind
            image: docker:dind
            restartPolicy: Always
            args:
              - dockerd
              - --host=unix:///var/run/docker.sock
              - --group=$(DOCKER_GROUP_GID)
            env:
              - name: DOCKER_GROUP_GID
                value: "123"
            securityContext:
              privileged: true
            startupProbe:
              exec:
                command: [docker, info]
              initialDelaySeconds: 0
              failureThreshold: 24
              periodSeconds: 5
            resources:
              requests:
                cpu: "100m"
                memory: "512Mi"
              limits:
                cpu: "1000m"
                memory: "2Gi"
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /var/run
              - name: dind-externals
                mountPath: /home/runner/externals
              - name: var-lib-docker
                mountPath: /var/lib/docker
              - name: arc-dind-daemon-config
                mountPath: /etc/docker
        containers:
          - name: runner
            image: ghcr.io/falcondev-oss/actions-runner:latest
            command: ["/home/runner/run.sh"]
            env:
              - name: DOCKER_HOST
                value: unix:///var/run/docker.sock
              - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
                value: "120"
              - name: CUSTOM_ACTIONS_RESULTS_URL
                value: http://actions-cache-server.arc-runners.svc.cluster.local:3000/
              - name: TURBO_API
                value: http://turborepo-remote-cache.arc-runners.svc.cluster.local
              - name: TURBO_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: turbo-cache-token
                    key: turbo-cache-token
            resources:
              requests:
                cpu: "250m"
                memory: "1Gi"
                ephemeral-storage: "1Gi"
              limits:
                cpu: "1000m"
                memory: "2.5Gi"
                ephemeral-storage: "5Gi"
            volumeMounts:
              - name: dind-sock
                mountPath: /var/run
              - name: work
                mountPath: /home/runner/_work
              - name: pnpm-store
                mountPath: /home/runner/.local/share/pnpm/store
        volumes:
          - name: dind-sock
            emptyDir: {}
          - name: dind-externals
            emptyDir: {}
          - name: var-lib-docker
            emptyDir: { sizeLimit: 20Gi }
          - name: work
            emptyDir: { sizeLimit: 10Gi }
          - name: pnpm-store
            persistentVolumeClaim:
              claimName: arc-pnpm-store
          - name: arc-dind-daemon-config
            configMap:
              name: arc-dind-daemon-config
        priorityClassName: arc-runner-low
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: non-prod-gen2-amd64-runner
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchExpressions:
                      - key: longhorn.io/component
                        operator: In
                        values: ["instance-manager"]
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: runner
                app.kubernetes.io/instance: non-prod-gen2-dind-runner
