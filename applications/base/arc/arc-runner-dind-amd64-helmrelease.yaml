---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runner-dind-amd64
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: arc-runners
  releaseName: non-prod-gen2-dind-runner
  dependsOn:
    - name: arc-controller
  chart:
    spec:
      chart: gha-runner-scale-set
      version: '0.14.1'
      sourceRef:
        kind: HelmRepository
        name: gha-runner-scale-set-charts
        namespace: flux-system
      interval: 12h
  values:
    githubConfigUrl: https://github.com/pbabbott/home-web-apps
    githubConfigSecret: arc-gh-secret
    runnerScaleSetName: non-prod-gen2-dind-runner
    minRunners: 1
    maxRunners: 3
    runnerGroup: default
    listenerTemplate:
      spec:
        containers:
          - name: listener
        dnsConfig:
          options:
            - name: ndots
              value: "2"
    containerMode:
      type: dind
    template:
      spec:
        dnsConfig:
          options:
            - name: ndots
              value: "2"
        nodeSelector:
          kubernetes.io/arch: amd64
        containers:
          - name: runner
            image: ghcr.io/falcondev-oss/actions-runner:latest
            command: ["/home/runner/run.sh"]
            env:
              - name: CUSTOM_ACTIONS_RESULTS_URL
                value: http://actions-cache-server.arc-runners.svc.cluster.local:3000/
              - name: TURBO_API
                value: http://turborepo-remote-cache.arc-runners.svc.cluster.local
              - name: TURBO_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: turbo-cache-token
                    key: turbo-cache-token
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
                ephemeral-storage: "2Gi"
              limits:
                cpu: "1000m"
                memory: "2.5Gi"
                ephemeral-storage: "20Gi"
            volumeMounts:
              - name: pnpm-store
                mountPath: /home/runner/.local/share/pnpm/store
          - name: dind
            args: ["--mtu=1450"]
            resources:
              requests:
                cpu: "250m"
                memory: "512Mi"
                ephemeral-storage: "2Gi"
              limits:
                cpu: "500m"
                memory: "4Gi"
                ephemeral-storage: "20Gi"
        volumes:
          - name: var-lib-docker
            emptyDir: { sizeLimit: 20Gi }
          - name: work
            emptyDir: { sizeLimit: 10Gi }
          - name: pnpm-store
            persistentVolumeClaim:
              claimName: arc-pnpm-store
        priorityClassName: arc-runner-low
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: non-prod-gen2-amd64-runner
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchExpressions:
                      - key: longhorn.io/component
                        operator: In
                        values: ["instance-manager"]
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: runner
                app.kubernetes.io/instance: non-prod-gen2-dind-runner
