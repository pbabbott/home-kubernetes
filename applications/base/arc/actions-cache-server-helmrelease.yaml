---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actions-cache-server
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: arc-runners
  releaseName: actions-cache-server
  chart:
    spec:
      chart: github-actions-cache-server
      version: '1.0.3'
      sourceRef:
        kind: HelmRepository
        name: falcondev-oss-charts
        namespace: flux-system
      interval: 24h
  values:
    fullnameOverride: actions-cache-server
    config:
      apiBaseUrl: http://actions-cache-server.arc-runners.svc.cluster.local:3000
      storage:
        driver: filesystem
        filesystem:
          path: /data/cache
      db:
        driver: sqlite
        sqlite:
          path: /data/cache-server.db
    persistentVolumeClaim:
      storage: 30Gi
      storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
        ephemeral-storage: 256Mi
      limits:
        memory: 1Gi
        ephemeral-storage: 1Gi
    nodeSelector:
      kubernetes.io/arch: amd64
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: actions-cache-server
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: Recreate
