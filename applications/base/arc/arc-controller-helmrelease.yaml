---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-controller
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: arc-systems
  releaseName: arc-controller
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: '0.14.1'
      sourceRef:
        kind: HelmRepository
        name: gha-runner-scale-set-charts
        namespace: flux-system
      interval: 12h
  values:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    metrics:
      controllerManagerAddr: ":8080"
      listenerAddr: ":8080"
      listenerEndpoint: "/metrics"
    flags:
      logLevel: "info"
    dnsConfig:
      options:
        - name: ndots
          value: "2"
