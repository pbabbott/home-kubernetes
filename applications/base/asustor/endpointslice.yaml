# ASUSTOR web UI (see apps/homelab/asustor). Override per cluster if needed.
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: asustor-1
  namespace: asustor
  labels:
    kubernetes.io/service-name: asustor
addressType: IPv4
ports:
  - name: http
    appProtocol: http
    protocol: TCP
    port: 9000
endpoints:
  - addresses:
      - "192.168.4.124"
