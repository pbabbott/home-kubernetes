---
# Create this vault item in 1Password before deploying:
#   Vault: Homelab
#   Item: harbor-admin-nonprod
#   Field: password  (Harbor admin UI password)
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: harbor-admin-secret
  namespace: harbor
  annotations:
    operator.1password.io/auto-restart: "true"
spec:
  itemPath: "vaults/Homelab/items/harbor-admin-nonprod"
