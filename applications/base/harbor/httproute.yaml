# Default hostnames; each cluster overrides in *-gen2/harbor/kustomization.yaml patches.
# Harbor's internal nginx (exposed via the "harbor" ClusterIP service) handles routing
# between the portal and core API paths — no path-based splitting needed here.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: harbor
  labels:
    pihole-dns-enabled: "true"
  annotations:
    external-dns.alpha.kubernetes.io/target: "192.168.6.28"
spec:
  parentRefs:
    - name: istio-ingress
      namespace: istio-system
      sectionName: https
  hostnames:
    - harbor.local.non-prod.abbottland.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /proxy-dockerhub/v2
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v2/proxy-dockerhub
      backendRefs:
        - name: harbor
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /proxy-ghcr/v2
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /v2/proxy-ghcr
      backendRefs:
        - name: harbor
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: harbor
          port: 80
