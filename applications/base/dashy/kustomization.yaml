apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml

# Minimal conf until you add a conf.yml via overlay (configMapGenerator files) or patch.
configMapGenerator:
  - name: dashboard-config
    namespace: dashy
    literals:
      - |
        conf.yml=pageTitle: Dashy
        pages: []
