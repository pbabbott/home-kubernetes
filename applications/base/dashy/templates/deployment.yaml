apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: dashy
  labels:
    app: dashy
  name: dashy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashy
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        app: dashy
    spec:
      containers:
        - image: lissy93/dashy:latest
          name: dashy
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: dashy-item-icons
              mountPath: /app/public/item-icons
            - name: config-volume
              mountPath: /app/user-data/
          resources: {}
      volumes:
        - name: dashy-item-icons
          emptyDir: {}
        - name: config-volume
          configMap:
            name: dashboard-config
