apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: dashy
data:
  conf.yml: |
    appConfig:
      theme: default
      layout: auto
      iconSize: large
      language: en
    pageInfo:
      title: Homelab non-prod
    sections:
      - name: Central Admin
        icon: fas fa-server
        displayData:
          sortBy: default
          rows: 1
          cols: 1
          collapsed: false
          hideForGuests: false
        items:
          - title: Pi Hole
            description: Network Ad-blocking & DNS
            icon: hl-pi-hole
            url: {{ .Values.urls.pihole }}
            target: newtab
            id: 0_1234_pihole
          - title: HA Proxy
            description: Load Balancer (LXC)
            icon: hl-haproxy
            url: {{ .Values.urls.haproxy }}
            target: newtab
            id: 1_1234_haproxy
          - title: Proxmox
            description: Virtualization
            icon: hl-proxmox
            url: {{ .Values.urls.proxmox }}
            target: newtab
            id: 2_1234_proxmox
          - title: Asustor
            description: NAS Management Portal
            icon: sh-asustor
            url: {{ .Values.urls.asustor }}
            target: newtab
            id: 3_1234_asustor
          - title: Dashy (prod)
            description: Production Dashboard
            icon: sh-dashy
            url: https://dashy.local.abbottland.io
            target: sametab
            id: 4_1234_dashyprod
          - title: Dashy (non-prod)
            description: Non-Prod Dashboard
            icon: sh-dashy
            url: https://dashy.local.non-prod.abbottland.io
            target: sametab
            id: 5_1234_dashynonprod
      - name: Cluster Admin
        icon: sh-kubernetes
        displayData:
          sortBy: default
          rows: 1
          cols: 1
          collapsed: false
          hideForGuests: false
        items:
          - title: Flux Operator
            description: Flux Status
            icon: hl-flux-operator
            url: {{ .Values.urls.flux }}
            target: newtab
            id: 0_1259_fluxoperator
          - title: Longhorn
            description: Cluster Storage Management
            icon: hl-longhorn
            url: {{ .Values.urls.longhorn }}
            target: newtab
            id: 1_1259_longhorn
          - title: Prometheus
            description: Metrics Aggregation
            icon: hl-prometheus
            url: {{ .Values.urls.prometheus }}
            target: newtab
            id: 2_1259_prometheus
          - title: Grafana
            description: Dashboards
            icon: hl-grafana
            url: {{ .Values.urls.grafana }}
            target: newtab
            id: temp_Grafana
    pages: []
