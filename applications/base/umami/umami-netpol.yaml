apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: umami
  namespace: umami
spec:
  podSelector:
    matchLabels:
      app: umami
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 3000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 192.168.4.124/32
      ports:
        - port: 5432
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
