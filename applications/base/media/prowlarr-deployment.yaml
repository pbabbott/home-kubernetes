apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: prowlarr
  name: prowlarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      containers:
        - image: lscr.io/linuxserver/prowlarr:latest
          name: prowlarr
          envFrom:
            - configMapRef:
                name: servarr-env
          env:
            - name: PROWLARR__POSTGRES__HOST
              value: "nas.local.abbottland.io"
            - name: PROWLARR__POSTGRES__PORT
              value: "5432"
            - name: PROWLARR__POSTGRES__USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: PROWLARR__POSTGRES__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: PROWLARR__POSTGRES__MAINDB
              value: "prowlarrdb"
            - name: PROWLARR__POSTGRES__LOGDB
              value: "prowlarrlogdb"
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config
          resources: {}
          ports:
            - containerPort: 9696
              hostPort: 9696
              name: httpa
              protocol: TCP
      volumes:
        - name: prowlarr-config
          persistentVolumeClaim:
            claimName: prowlarr-config
