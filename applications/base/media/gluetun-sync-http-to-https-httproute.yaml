apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gluetun-sync-http-to-https
  namespace: media
spec:
  parentRefs:
    - name: istio-ingress
      namespace: istio-system
      sectionName: http
  hostnames:
    - "gluetun-sync.local.abbottland.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
