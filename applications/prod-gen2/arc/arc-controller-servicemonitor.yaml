---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: arc-controller
  namespace: arc-systems
  labels:
    release: monitoring
spec:
  endpoints:
    - port: metrics
      interval: 1m
      scrapeTimeout: 30s
      scheme: http
      relabelings:
        - targetLabel: job
          replacement: arc-controller
  selector:
    matchLabels:
      app.kubernetes.io/name: gha-rs-controller
      app.kubernetes.io/instance: arc-controller
  namespaceSelector:
    matchNames:
      - arc-systems
