apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/dashy

patches:
  - target:
      kind: HTTPRoute
      name: dashy
      namespace: dashy
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: dashy.local.non-prod.abbottland.io
  - target:
      kind: HTTPRoute
      name: dashy-http-to-https
      namespace: dashy
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: dashy.local.non-prod.abbottland.io
