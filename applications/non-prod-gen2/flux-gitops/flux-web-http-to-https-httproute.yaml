# Port 80 → 301 to HTTPS (listener "http" on istio-ingress Gateway). Flux Operator's
# web.httpRoute uses sectionName https only; this route mirrors applications/non-prod-gen2/podinfo/httproute.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flux-web-http-to-https
  namespace: flux-system
spec:
  parentRefs:
    - name: istio-ingress
      namespace: istio-system
      sectionName: http
  hostnames:
    - flux.local.non-prod.abbottland.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
