apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator-mcp
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: flux-system
  releaseName: flux-operator-mcp
  dependsOn:
    - name: flux-operator
      namespace: flux-system
  chartRef:
    kind: OCIRepository
    name: flux-operator-mcp
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    transport: http
    readonly: true
    networkPolicy:
      create: true
      ingress:
        namespaces:
          - istio-system
    httpRoute:
      enabled: true
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: istio-ingress
          namespace: istio-system
          sectionName: https
      hostnames:
        - flux-mcp.local.non-prod.abbottland.io
