apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/crowdsec

patches:
  - target:
      kind: HelmRelease
      name: crowdsec
      namespace: flux-system
    patch: |-
      - op: add
        path: /spec/values/service
        value:
          type: NodePort
          nodePort: 32080
