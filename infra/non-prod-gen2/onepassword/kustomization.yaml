apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# After generating op-credentials.yaml (see docs/reference-1password-integration-overview.md
# — “Non-prod gen2 cluster”), keep that file here; it is sealed for this cluster only.
resources:
  - ../../base/onepassword
  - op-credentials.yaml

patches:
  - target:
      kind: HTTPRoute
      name: op-connect
      namespace: op-connect
    patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: op-connect.local.non-prod.abbottland.io
