apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/external-dns/namespace.yaml
  - ../../base/external-dns/external-dns-helm-repository.yaml
  - ../../base/external-dns/external-dns-pihole-helmrelease.yaml
  - ../../base/external-dns/pihole-admin-onepassword.yaml

patches:
  - target:
      kind: HelmRelease
      name: external-dns-pihole
    patch: |-
      - op: replace
        path: /spec/values/domainFilters
        value: ["local.non-prod.abbottland.io"]
