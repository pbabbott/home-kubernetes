---
# StorageClass for data that should be automatically backed up via Longhorn.
# Any PVC using this class is enrolled in the "default" recurring-job group,
# which runs the daily-backups RecurringJob (2 AM, retains 2 backups).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-backup
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "30"
  fromBackup: ""
  recurringJobSelector: '[{"name":"daily-backups","isGroup":true}]'
