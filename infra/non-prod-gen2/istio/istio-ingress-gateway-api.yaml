# Gateway API resource (listener config), not a CRD. CRDs: crds/non-prod-gen2/gateway-api/
# Use the Helm-provisioned gateway Service (NodePort 30080/30443) instead of a second
# dataplane (istio-ingress-istio). See:
# https://istio.io/latest/docs/tasks/traffic-management/ingress/gateway-api/#manual-deployment
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: istio-ingress
  namespace: istio-system
spec:
  gatewayClassName: istio
  addresses:
    - type: Hostname
      value: istio-system-istio-ingress.istio-system.svc.cluster.local
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
