apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-cni
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: istio-system
  dependsOn:
    - name: istiod
      namespace: flux-system
  chart:
    spec:
      chart: cni
      version: "1.24.*"
      sourceRef:
        kind: HelmRepository
        name: istio
  values:
    profile: ambient
