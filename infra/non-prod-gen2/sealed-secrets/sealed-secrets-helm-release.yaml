apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: kube-system
  releaseName: sealed-secrets
  chart:
    spec:
      chart: sealed-secrets
      version: "2.15.4"
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
        namespace: flux-system
      interval: 12h
  install:
    crds: Skip
  upgrade:
    crds: Skip
  values:
    fullnameOverride: sealed-secrets-controller
