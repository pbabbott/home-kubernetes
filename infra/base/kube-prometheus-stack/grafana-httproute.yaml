# Default hostnames; each cluster overrides in *-gen2/kube-prometheus-stack/kustomization.yaml patches.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-ui
  namespace: kube-prometheus-stack
spec:
  parentRefs:
    - name: istio-ingress
      namespace: istio-system
      sectionName: https
  hostnames:
    - grafana.local.non-prod.abbottland.io
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
