---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: op-connect
  namespace: op-connect
spec:
  parentRefs:
    - name: istio-ingress
      namespace: istio-system
      sectionName: https
  hostnames:
    - op-connect.local.abbottland.io
  rules:
    - backendRefs:
        - name: onepassword-connect
          port: 8080
