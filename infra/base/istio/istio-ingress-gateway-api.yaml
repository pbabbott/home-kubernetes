# Gateway API resource (listener config), not a CRD. CRDs: crds/base/gateway-api/
# Use the Helm-provisioned gateway Service (NodePort 30080/30443) instead of a second
# dataplane (istio-ingress-istio). See:
# https://istio.io/latest/docs/tasks/traffic-management/ingress/gateway-api/#manual-deployment
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: istio-ingress
  namespace: istio-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: istio
  addresses:
    - type: Hostname
      value: istio-system-istio-ingress.istio-system.svc.cluster.local
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "*.local.abbottland.io"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-local-tls
      allowedRoutes:
        namespaces:
          from: All
