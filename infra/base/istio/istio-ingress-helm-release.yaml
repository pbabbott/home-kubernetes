apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: istio-system
  dependsOn:
    - name: ztunnel
      namespace: flux-system
  chart:
    spec:
      chart: gateway
      version: "1.25.*"
      sourceRef:
        kind: HelmRepository
        name: istio
  values:
    labels:
      istio.io/dataplane-mode: none
      "gateway.networking.k8s.io/gateway-name": istio-ingress
    # Parity with ingress-nginx controller.kind: DaemonSet
    kind: DaemonSet
    # HPA is for Deployments; disable for DaemonSet gateways
    autoscaling:
      enabled: false
    # HAProxy (and similar) hits NodePort with send-proxy-v2 — Envoy must expect PROXY.
    # Plain in-cluster curls to :30080 without PROXY will fail unless you hop via the LB or use svc ClusterIP.
    # See temp/haproxy.cfg and INGRESS_TO_ISTIO_MAPPING.md.
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "15020"
      prometheus.io/path: "/stats/prometheus"
      inject.istio.io/templates: "gateway"
      sidecar.istio.io/inject: "true"
      proxy.istio.io/config: '{"gatewayTopology":{"proxyProtocol":{},"numTrustedProxies":1}}'
    service:
      type: NodePort
      externalTrafficPolicy: Local
      ports:
        - name: status-port
          port: 15021
          protocol: TCP
          targetPort: 15021
        - name: http2
          port: 80
          protocol: TCP
          targetPort: 80
          nodePort: 30080
        - name: https
          port: 443
          protocol: TCP
          targetPort: 443
          nodePort: 30443
