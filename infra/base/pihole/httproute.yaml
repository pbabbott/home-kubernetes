# Default hostnames; each cluster overrides in *-gen2/pihole/kustomization.yaml patches.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pihole
  namespace: pihole
  labels:
    pihole-dns-enabled: "true"
  annotations:
    external-dns.alpha.kubernetes.io/target: "192.168.6.28"
spec:
  parentRefs:
    - name: istio-ingress
      namespace: istio-system
      sectionName: https
  hostnames:
    - pihole.local.non-prod.abbottland.io
  rules:
    - matches:
        - path:
            type: Exact
            value: /admin
      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 301
            path:
              type: ReplaceFullPath
              replaceFullPath: /
    - matches:
        - path:
            type: PathPrefix
            value: /admin/
      backendRefs:
        - name: pihole
          port: 8081
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /admin/
      backendRefs:
        - name: pihole
          port: 8081
