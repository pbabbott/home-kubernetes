apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-pihole
  namespace: flux-system
spec:
  interval: 4h
  targetNamespace: external-dns
  releaseName: external-dns-pihole
  dependsOn:
    - name: op-connect
      namespace: flux-system
  chart:
    spec:
      chart: external-dns
      version: "1.15.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 12h
  values:
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/mwalbeck/external-dns-pihole-webhook
          tag: "1"
        env:
          - name: PIHOLE_SERVER
            value: "http://pihole.pihole.svc.cluster.local:8081"
          - name: PIHOLE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: pihole-admin-secret
                key: password
    sources:
      - gateway-httproute
    policy: sync
    registry: txt
    txtPrefix: "_extdns-local."
    # txtOwnerId and domainFilters set per cluster via overlay patch
    managedRecordTypes:
      - A
    extraArgs:
      - --label-filter=pihole-dns-enabled=true
