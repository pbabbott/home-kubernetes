apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 4h
  targetNamespace: external-dns
  releaseName: external-dns
  dependsOn:
    - name: op-connect
      namespace: flux-system
  chart:
    spec:
      chart: external-dns
      version: "1.15.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 12h
  values:
    provider:
      name: cloudflare
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token-secret
            key: cloudflare_api_token
    sources:
      - gateway-httproute
    policy: sync
    registry: txt
    txtPrefix: "_extdns."
    # txtOwnerId and domainFilters set per cluster via overlay patch
    extraArgs:
      - --cloudflare-proxied
      - --label-filter=external-dns-enabled=true
      - --managed-record-types=CNAME
